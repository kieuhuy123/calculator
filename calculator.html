<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
    .calc-box {
      background: #ffffff;
      border: 1px solid #ccc;
      padding: 24px 32px;
      width: 280px;
    }
    h2 { font-size: 18px; font-weight: bold; margin: 0 0 20px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      height: 28px;
      border: 1px solid #999;
      padding: 0 6px;
      font-size: 14px;
      margin-bottom: 14px;
    }
    .send-btn {
      width: 100%;
      height: 30px;
      background: #f5f5f5;
      border: 1px solid #ccc;
      font-size: 13px;
      cursor: pointer;
    }
    .output-label { font-size: 15px; font-weight: bold; margin: 18px 0 4px; }
    #out { font-size: 14px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="calc-box">
    <h2>Calculator</h2>
    <label>Number 1</label>
    <input type="text" id="n1" value="2" />
    <label>Number 2</label>
    <input type="text" id="n2" value="3" />
    <button class="send-btn" onclick="calculate()">send</button>
    <p class="output-label">Output:</p>
    <p id="out"></p>
  </div>

  <script>
    function calculate() {
      const a = document.getElementById('n1').value;
      const b = document.getElementById('n2').value;
      document.getElementById('out').textContent = a + b;
    }
  </script>
</body>
</html>
