<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
    .calc-box {
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 24px 32px;
      width: 280px;
    }
    h2 {
      font-size: 18px;
      font-weight: bold;
      margin: 0 0 20px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      height: 28px;
      border: 1px solid #999;
      border-radius: 2px;
      padding: 0 6px;
      font-size: 14px;
      margin-bottom: 14px;
    }
    .ops {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .op-btn {
      flex: 1;
      height: 26px;
      font-size: 13px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 2px;
      cursor: pointer;
    }
    .op-btn.active {
      background: #dceeff;
      border-color: #5599dd;
      color: #1a4f8a;
    }
    .send-btn {
      width: 100%;
      height: 30px;
      background: #f5f5f5;
      border: 1px solid #ccc;
      border-radius: 2px;
      font-size: 13px;
      cursor: pointer;
    }
    .send-btn:hover {
      background: #e8e8e8;
    }
    .output-label {
      font-size: 15px;
      font-weight: bold;
      margin: 18px 0 4px;
    }
    #out {
      font-size: 14px;
      min-height: 20px;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="calc-box">
    <h2>Calculator</h2>
    <label>Number 1</label>
    <input type="number" id="n1" value="2" />
    <div class="ops">
      <button class="op-btn active" id="op-add" onclick="setOp('+')">+</button>
      <button class="op-btn" id="op-sub" onclick="setOp('-')">−</button>
      <button class="op-btn" id="op-mul" onclick="setOp('×')">×</button>
      <button class="op-btn" id="op-div" onclick="setOp('÷')">÷</button>
    </div>
    <label>Number 2</label>
    <input type="number" id="n2" />
    <button class="send-btn" onclick="calculate()">send</button>
    <p class="output-label">Output:</p>
    <p id="out"></p>
  </div>

  <script>
    let op = '+';

    function setOp(o) {
      op = o;
      const map = { '+': 'add', '-': 'sub', '×': 'mul', '÷': 'div' };
      ['+', '-', '×', '÷'].forEach(x => {
        document.getElementById('op-' + map[x]).className =
          'op-btn' + (x === o ? ' active' : '');
      });
    }

    function calculate() {
      const a = parseFloat(document.getElementById('n1').value);
      const b = parseFloat(document.getElementById('n2').value);
      if (isNaN(a) || isNaN(b)) {
        document.getElementById('out').textContent = 'Please enter both numbers';
        return;
      }
      let r;
      if (op === '+') r = a + b;
      else if (op === '-') r = a - b;
      else if (op === '×') r = a * b;
      else {
        if (b === 0) { document.getElementById('out').textContent = 'Cannot divide by 0'; return; }
        r = a / b;
      }
      document.getElementById('out').textContent = parseFloat(r.toFixed(10)).toString();
    }
  </script>
</body>
</html>
